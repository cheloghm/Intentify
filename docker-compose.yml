version: '3.9'

services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: intentify

  backend:
    build:
      context: ./src/backend
      dockerfile: app/Intentify.AppHost/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_ENVIRONMENT: Production
      Intentify__Mongo__ConnectionString: mongodb://mongo:27017
      Intentify__Mongo__DatabaseName: intentify
      Intentify__Jwt__Issuer: intentify
      Intentify__Jwt__Audience: intentify-users
      Intentify__Jwt__SigningKey: dev-signing-key-change-this-in-production-32chars
      Intentify__Jwt__AccessTokenMinutes: "60"
      Intentify__Cors__AllowedOrigins: http://localhost
      Intentify__Anthropic__ApiKey: ${Intentify__Anthropic__ApiKey:-}
      Intentify__Email__Resend__ApiKey: ${Intentify__Email__Resend__ApiKey:-}
      Intentify__Email__Resend__FromAddress: notify@intentify.io
      Intentify__Email__Resend__FromName: Intentify
      Intentify__Auth__Google__ClientId: ${Intentify__Auth__Google__ClientId:-}
      Intentify__Auth__Google__ClientSecret: ${Intentify__Auth__Google__ClientSecret:-}
      Intentify__Auth__Google__RedirectUri: http://localhost:5000/auth/google/callback
      Intentify__Sites__AllowLocalhostInstallStatus: "true"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./src/frontend/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      INTENTIFY_API_BASE_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
