server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Reverse-proxy all /api/* calls to the backend.
  # This keeps requests same-origin from the browser's perspective,
  # eliminating CORS entirely.
  location /api/ {
    proxy_pass https://BACKEND_PLACEHOLDER;
    proxy_ssl_server_name on;
    proxy_http_version 1.1;
    proxy_set_header Host BACKEND_PLACEHOLDER;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location = / {
    try_files /landing.html =404;
  }

  location = /app {
    try_files /index.html =404;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /public/index.html;
  }
}
